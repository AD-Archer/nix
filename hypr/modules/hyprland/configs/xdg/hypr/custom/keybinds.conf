# See https://wiki.hyprland.org/Configuring/Binds/
$mainMod = SUPER # Primary modifier key
# Disable Ctrl+W globally so it won't close windows accidentally
#!
##! User
bind = Ctrl+Super, Slash, exec, xdg-open ~/.config/illogical-impulse/config.json # Edit shell config
bind = Ctrl+Super+Alt, Slash, exec, xdg-open ~/.config/hypr/custom/keybinds.conf # Edit extra keybinds

bind = CTRL+SHIFT, L, exec, wlogout --protocol layer-shell
bind = , XF86PowerOff, exec, wlogout --protocol layer-shell
bind = $mainMod, SPACE, togglefloating

# Launcher is handled by the base Hyprland keybinds (Super+D)

bind = $mainMod, W, exec, waypaper
bind = $mainMod, Z, exec, flatpak run app.zen_browser.zen

# Resize active window
binde = $mainMod CTRL, H, resizeactive, -10 0
binde = $mainMod CTRL, J, resizeactive, 0 10
binde = $mainMod CTRL, K, resizeactive, 0 -10
binde = $mainMod CTRL, L, resizeactive, 10 0

